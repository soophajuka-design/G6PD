<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G6PD Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="view-section">
            <div class="top-meta">
                <div id="dt-now">Date/Time: --/--/-- --:--</div>
                <div id="status-line">Status: UV 365nm Active<br>Target: G6PD Fluorescence</div>
            </div>
            
            <div class="camera-container">
                <video id="video" autoplay playsinline></video>
                <div class="grid-overlay" id="grid">
                    </div>
            </div>
        </div>

        <button id="cap-btn">CAPTURE & SAVE</button>

        <div class="result-section">
            <table id="res-table">
                <thead>
                    <tr>
                        <th>Pos</th>
                        <th>Fluorescence Result</th>
                        <th>Intensity</th>
                    </tr>
                </thead>
                <tbody id="res-body">
                    </tbody>
            </table>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
