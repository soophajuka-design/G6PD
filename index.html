<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G6PD Pro Analyzer v1.2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <div class="compact-text">
            Live Analysis: UV 365nm | Target: G6PD Fluorescence<br>
            Align filter paper (7.1 x 12.8 cm) within the 4x5 grid boundary.
        </div>
    </div>

    <div id="camera-container">
        <video id="webcam" autoplay playsinline></video>
        <div id="grid-overlay"></div>
    </div>

    <div class="controls">
        <button id="capture-btn">📸 วิเคราะห์ผลภาพนิ่ง</button>
    </div>

    <div id="results">
        <table id="result-table">
            <thead>
                <tr>
                    <th>ตำแหน่ง</th>
                    <th>ประเภทวงกลม</th>
                    <th>ความสว่าง</th>
                    <th>สรุปผล (Result)</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <canvas id="proc-canvas" style="display:none;"></canvas>
    <script src="app.js"></script>
</body>
</html>
