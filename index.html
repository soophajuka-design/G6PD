<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G6PD Analyzer Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <header class="compact-header">
            <div class="info">
                G6PD Fluorescence Analysis | UV 365nm<br>
                Plate: 7.1x12.8 cm | Grid: 4x5 | Status: Active
            </div>
        </header>

        <main id="camera-container">
            <video id="webcam" autoplay playsinline></video>
            <div id="grid-overlay"></div>
        </main>

        <section class="action-bar">
            <button id="capture-btn">📸 วิเคราะห์และบันทึกผล</button>
        </section>

        <footer id="results-area">
            <table id="result-table">
                <thead>
                    <tr>
                        <th>Pos</th>
                        <th>Type</th>
                        <th>Blue Int.</th>
                        <th>Result</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </footer>
    </div>
    <canvas id="proc-canvas" style="display:none;"></canvas>
    <script src="app.js"></script>
</body>
</html>
