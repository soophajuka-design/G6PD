<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G6PD Pro Analyzer v1.4</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="header-compact">
            G6PD Analysis: UV 365nm Mode<br>
            Grid 4x5 | Target: Blue Fluorescence
        </header>

        <div id="camera-container">
            <video id="webcam" autoplay playsinline></video>
            <div id="grid-overlay"></div>
        </div>

        <div class="controls">
            <button id="capture-btn" class="btn-primary">📸 วิเคราะห์ผล</button>
            <button id="reset-btn" class="btn-secondary">🔄 Reset</button>
        </div>

        <div id="table-area">
            <table id="result-table">
                <thead>
                    <tr>
                        <th>Pos</th>
                        <th>Type</th>
                        <th>Intensity</th>
                        <th>Result</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
    <canvas id="proc-canvas" style="display:none;"></canvas>
    <script src="app.js"></script>
</body>
</html>
