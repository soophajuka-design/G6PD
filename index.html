<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G6PD Analyzer - Live Scan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h2>G6PD Real-time Analysis 🧪</h2>
            <div id="summary-bar" class="summary-panel">
                กำลังโหลดระบบ...
            </div>
        </header>

        <main class="viewport">
            <video id="video" autoplay playsinline style="display:none;"></video>
            <canvas id="outputCanvas"></canvas>
        </main>

        <footer>
            <button id="btn-camera" class="btn-primary">เปิดกล้อง</button>
            <p class="hint">แตะที่หยดเลือดเพื่อเปลี่ยนสถานะ (S → N → D)</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
