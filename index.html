<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G6PD Analyzer PWA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="app-container">
        <div class="live-view-section">
            <div class="header-info">
                <p id="timestamp">Date/Time: --/--/-- --:--</p>
                <p>Status: UV 365nm Analysis Active (Max 2 lines)</p>
            </div>
            <div class="video-wrapper">
                <video id="webcam" autoplay playsinline></video>
                <canvas id="grid-overlay"></canvas>
            </div>
        </div>

        <div class="table-section">
            <table id="result-table">
                <thead>
                    <tr>
                        <th>Pos</th>
                        <th>Fluorescence Result</th>
                        <th>Intensity</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
            <button id="capture-btn">CAPTURE & SAVE</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
