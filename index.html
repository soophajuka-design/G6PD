<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G6PD Pro Analyzer v1.1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h2>G6PD Fluorescence Analyzer 🧪</h2>
        <p>PLATE: 7.1 x 12.8 cm | GRID: 4 x 5</p>
    </div>

    <div id="camera-container">
        <video id="webcam" autoplay playsinline></video>
        <div id="grid-overlay"></div>
    </div>

    <div class="controls">
        <button id="capture-btn">📸 วิเคราะห์ผลภาพนิ่ง</button>
        <div class="legend">
            <span>⚪ Sample</span>
            <span style="color: #00ff00;">🟢 Normal</span>
            <span style="color: #ff4444;">🔴 Deficient</span>
        </div>
    </div>

    <div id="results">
        <table id="result-table">
            <thead>
                <tr>
                    <th>ตำแหน่ง</th>
                    <th>ประเภท</th>
                    <th>ความสว่าง</th>
                    <th>สรุปผล</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <canvas id="proc-canvas" style="display:none;"></canvas>
    <script src="app.js"></script>
</body>
</html>
