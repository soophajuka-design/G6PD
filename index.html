<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G6PD Analyzer V2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="camera-section">
            <div class="info-overlay">
                <p id="live-clock">Date/Time: --/--/-- --:--</p>
                <p>Status: UV 365nm Analysis Active<br>Target: G6PD Fluorescence</p>
            </div>
            <video id="video" autoplay playsinline></video>
            <div class="grid-layer" id="grid-container">
                </div>
        </div>

        <div class="control-bar">
            <button id="capture-btn">CAPTURE & SAVE RESULT</button>
        </div>

        <div class="table-section">
            <table id="result-table">
                <thead>
                    <tr>
                        <th>Pos</th>
                        <th>Fluorescence Result</th>
                        <th>Intensity</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
